{% extends "index.html" %}

{% block title %}
    Edit Meal Plan
{% endblock %}

{% block content %}
<h2 class="text-center my-5">Edit Meal Plan</h2>

<form method="POST" action="{{ url_for('edit_meal_plan', id=meal_plan.id) }}" class="mx-auto" style="max-width: 600px;">
    <div class="mb-3">
        <label for="title" class="form-label">Meal Plan Title</label>
        <input type="text" class="form-control" id="title" name="title" value="{{ meal_plan.title }}" required>
    </div>

    <h4>Select Recipes</h4>
    <div class="mb-3">
        {% for recipe in recipes %}
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="recipes" value="{{ recipe.id }}" id="recipe_{{ recipe.id }}">
                <label class="form-check-label" for="recipe_{{ recipe.id }}">{{ recipe.title }}</label>
            </div>
        {% endfor %}
    </div>
    <button type="submit" class="btn btn-primary">Update Meal Plan</button>
</form>

{% endblock %}
