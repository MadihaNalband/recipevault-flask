{% extends "index.html" %}

{% block title %}
    Edit Recipe
{% endblock %}

{% block content %}
<h2>Edit Recipe</h2>
<form method="post" enctype="multipart/form-data" action="{{ url_for('edit_recipe', id=recipe.id) }}">
    <div class="mb-3">
        <label for="title" class="form-label">Title</label>
        <input type="text" class="form-control" id="title" name="title" value="{{ recipe.title }}" required>
    </div>
    <div class="mb-3">
        <label for="ingredients" class="form-label">Ingredients</label>
        <textarea type="text" class="form-control" id="ingredients" name="ingredients" rows="3" required>{{ recipe.ingredients }}</textarea>
    </div>
    <div class="mb-3">
        <label for="instructions" class="form-label">Instructions</label>
        <textarea class="form-control" id="instructions" name="instructions" rows="5" required>{{ recipe.instructions }}</textarea>
    </div>
    <div class="mb-3">
        <label for="image" class="form-label">Recipe Image</label>
        <input type="file" class="form-control" id="image" name="image" accept="image/*">
    </div>

    <div class="mb-3">
        <label for="category" class="form-label">Category</label>
        <select class="form-select" id="category" name="category" required>
            <option value="Breakfast" {% if recipe.category == 'Breakfast' %}selected{% endif %}>Breakfast</option>
            <option value="Lunch" {% if recipe.category == 'Lunch' %}selected{% endif %}>Lunch</option>
            <option value="Dinner" {% if recipe.category == 'Dinner' %}selected{% endif %}>Dinner</option>
            <option value="Dessert" {% if recipe.category == 'Dessert' %}selected{% endif %}>Dessert</option>
            <option value="Vegetarian" {% if recipe.category == 'Vegetarian' %}selected{% endif %}>Vegetarian</option>
            <option value="Vegan" {% if recipe.category == 'Vegan' %}selected{% endif %}>Vegan</option>
            <option value="Gluten-Free" {% if recipe.category == 'Gluten-Free' %}selected{% endif %}>Gluten-Free</option>
            <option value="Quick" {% if recipe.category == 'Quick' %}selected{% endif %}>Quick</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Update Recipe</button>
</form>
{% endblock %}
