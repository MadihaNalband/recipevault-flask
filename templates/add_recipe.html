{% extends "index.html" %}

{% block title %}
    Add Recipe
{% endblock %}

{% block content %}
<h2 class="text-center my-5">Add New Recipe</h2>
<form method="POST" action="/add_recipe" enctype="multipart/form-data" class="mx-auto" style="max-width: 600px;">
    <div class="mb-3">
        <label for="title" class="form-label">Recipe Title</label>
        <input type="text" class="form-control" id="title" name="title" required>
    </div>
    <div class="mb-3">
        <label for="ingredients" class="form-label">Ingredients</label>
        <textarea type="text" class="form-control" id="ingredients" name="ingredients" rows="3" required></textarea>
    </div>
    <div class="mb-3">
        <label for="instructions" class="form-label">Instructions</label>
        <textarea class="form-control" id="instructions" name="instructions" rows="5" required></textarea>
    </div>
    <div class="mb-3">
        <label for="image" class="form-label">Recipe Image</label>
        <input type="file" class="form-control" id="image" name="image" accept="image/*">
    </div>
    <div class="mb-3">
        <label for="category" class="form-label">Category</label>
        <select class="form-select" id="category" name="category">
            <option value="Breakfast">Breakfast</option>
            <option value="Lunch">Lunch</option>
            <option value="Dinner">Dinner</option>
            <option value="Dessert">Dessert</option>
            <option value="Vegetarian">Vegetarian</option>
            <option value="Vegan">Vegan</option>
            <option value="Gluten-Free">Gluten-Free</option>
            <option value="Quick">Quick</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary w-100">Add Recipe</button>
</form>
{% endblock %}
